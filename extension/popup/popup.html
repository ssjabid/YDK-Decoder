<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YDK Decoder</title>
<style>
  :root {
    --bg: #0b0b0d;
    --bg-elevated: #131318;
    --bg-hover: #1c1c22;
    --border: #26262e;
    --border-strong: #3a3a44;
    --text: #e8e8ea;
    --text-dim: #8a8a94;
    --text-faint: #55555e;
    --accent: #e55b3c;
    --success: #5fc49a;
    --error: #c45f5f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 16px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 14px; font-weight: 500; }
  h1 .accent { color: var(--accent); }
  .version { font-size: 10px; color: var(--text-faint); font-family: "SF Mono", Menlo, monospace; }

  .field { margin-bottom: 12px; }
  .field-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: "SF Mono", Menlo, monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text-faint); }

  .btn {
    width: 100%;
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--text-faint); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover:not(:disabled) { background: #d54e30; }
  .btn.success { background: var(--success); border-color: var(--success); color: var(--bg); }
  .btn.small { padding: 6px 8px; font-size: 11px; }

  .btn-row { display: flex; gap: 6px; margin-top: 8px; }
  .btn-row .btn { flex: 1; }

  .status {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    font-size: 11px;
    line-height: 1.5;
  }
  .status.error { border-color: var(--error); color: var(--error); }
  .status.success { border-color: var(--success); color: var(--success); }
  .status.hidden { display: none; }

  .status-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .status-msg { color: var(--text); }

  .progress {
    margin-top: 8px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    width: 0%;
  }
  .progress-fill.animate {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .result-panel {
    margin-top: 12px;
    padding: 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .result-panel.hidden { display: none; }
  .result-title {
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .result-meta {
    font-size: 10px;
    color: var(--text-dim);
    font-family: "SF Mono", Menlo, monospace;
    margin-bottom: 8px;
  }
  .result-steps {
    max-height: 140px;
    overflow-y: auto;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.4;
    padding-right: 4px;
    margin-bottom: 10px;
    border-top: 1px dashed var(--border);
    padding-top: 8px;
  }
  .result-steps::-webkit-scrollbar { width: 4px; }
  .result-steps::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .result-step {
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 6px;
    margin-bottom: 3px;
  }
  .result-step-n {
    color: var(--text-faint);
    font-family: "SF Mono", Menlo, monospace;
  }

  .help {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-faint);
    line-height: 1.5;
  }
  .help strong { color: var(--text-dim); }
  .help code {
    font-family: "SF Mono", Menlo, monospace;
    background: var(--bg-elevated);
    padding: 1px 4px;
    border-radius: 2px;
    color: var(--accent);
  }
</style>
</head>
<body>
  <header>
    <h1>YDK <span class="accent">Decoder</span></h1>
    <span class="version">v1.0</span>
  </header>

  <div class="field">
    <label class="field-label" for="replay-url">DuelingBook replay URL</label>
    <input type="text" id="replay-url" class="input"
           placeholder="https://www.duelingbook.com/replay?id=...">
  </div>

  <button id="btn-extract" class="btn primary">Extract Combo</button>

  <div id="status" class="status hidden">
    <div class="status-label" id="status-label">Status</div>
    <div class="status-msg" id="status-msg"></div>
    <div class="progress"><div id="progress-fill" class="progress-fill"></div></div>
  </div>

  <div id="result-panel" class="result-panel hidden">
    <div class="result-title" id="result-title"></div>
    <div class="result-meta" id="result-meta"></div>
    <div class="result-steps" id="result-steps"></div>
    <div class="btn-row">
      <button id="btn-open-decoder" class="btn primary small">Open in YDK Decoder</button>
      <button id="btn-copy-json" class="btn small">Copy JSON</button>
    </div>
    <div class="btn-row">
      <button id="btn-reset" class="btn small">Extract Another</button>
    </div>
  </div>

  <div class="help">
    <strong>Tip:</strong> Start <code>python3 -m http.server 8000</code> in your YDK Decoder folder first. "Open in YDK Decoder" will open <code>localhost:8000/ydk_decoder.html</code> with the combo pre-loaded.
  </div>

  <script src="popup.js"></script>
</body>
</html>
